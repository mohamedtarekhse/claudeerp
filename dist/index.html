<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMICI ERP</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/index-BcxlkoJ_.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BaFJH18R.css">
</head>
<body>
<a href="#modContent" class="skip-link">Skip to content</a>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-ring-container">
    <svg class="loading-ring" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#d4a843"/>
          <stop offset="100%" stop-color="#f0d080"/>
        </linearGradient>
        <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#d4a843" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#f0d080" stop-opacity="0.4"/>
        </linearGradient>
      </defs>
      <circle class="loading-ring-track" cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
      <circle class="loading-ring-fill" id="loadingRingFill" cx="100" cy="100" r="82" fill="none" stroke="url(#ringGrad)" stroke-width="6" stroke-linecap="round" stroke-dasharray="515" stroke-dashoffset="515" transform="rotate(-90 100 100)"/>
      <circle class="loading-ring-glow" cx="100" cy="100" r="82" fill="none" stroke="url(#ringGrad2)" stroke-width="14" stroke-linecap="round" stroke-dasharray="515" stroke-dashoffset="515" transform="rotate(-90 100 100)" style="filter:blur(6px)"/>
    </svg>
    <div class="loading-logo">AM</div>
    <div class="loading-percent" id="loadingPercent">0%</div>
  </div>
  <div class="loading-title">AMICI ERP</div>
  <div class="loading-sub">Empowering Operations</div>
  <div class="loading-bar-track"><div class="loading-bar-fill" id="loadingBarFill"></div></div>
  <div class="loading-orbits">
    <div class="orbit-dot" style="--angle:0deg;--delay:0s"></div>
    <div class="orbit-dot" style="--angle:120deg;--delay:0.4s"></div>
    <div class="orbit-dot" style="--angle:240deg;--delay:0.8s"></div>
  </div>
</div>

<div id="authOverlay" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">AM</div>
    <h2>AMICI ERP</h2>
    <p>Sign in to access your dashboard</p>
    <div class="auth-form" id="authForm">
      <input type="email" id="authEmail" placeholder="Email address" autocomplete="email" />
      <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password" />
      <button id="authLoginBtn" type="button"><span id="authBtnText">Sign In</span><span id="authBtnSpinner" style="display:none"><i class="fa-solid fa-spinner fa-spin"></i> Signing in...</span></button>
      <div id="authError" class="auth-error"></div>
    </div>
  </div>
</div>

<header class="shell" id="shell">
  <div class="shell-brand">
    <button class="shell-btn" id="menuBtn" type="button" style="display:none; margin-right:4px;" aria-label="Open navigation menu">
      <i class="fa-solid fa-bars" aria-hidden="true"></i>
    </button>
    <div class="shell-logo">AM</div>
    <span class="shell-name">AMICI</span>
  </div>
  <div class="shell-divider"></div>
  <div class="shell-search-wrap">
    <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
    <input class="shell-search" id="shellSearch" placeholder="Search..." type="text">
  </div>
  <div class="shell-right">
    <button class="lang-btn" id="langBtn" type="button" aria-label="Toggle language">عر</button>
    <button class="shell-btn ai-btn" id="aiBtn" type="button" title="AMICI AI Assistant" aria-label="Open AI assistant"><i class="fa-solid fa-wand-magic-sparkles" style="color:var(--warning);font-size:16px"></i></button>
    <button class="shell-btn" id="notifBtn" type="button" title="Notifications" aria-label="Open notifications" style="position:relative;">
      <i class="fa-regular fa-bell" aria-hidden="true"></i>
      <span class="notif-badge" id="notifBadge">3</span>
    </button>
    <button class="shell-btn" id="logoutBtn" type="button" title="Log Out" aria-label="Log out">
      <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
    </button>
    <button class="shell-avatar" id="userBtn" type="button" title="User profile" aria-label="Open user menu">KA</button>
  </div>
</header>

<div class="ai-panel" id="aiPanel">
  <div class="ai-panel-head">
    <div style="width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;"><i class="fa-solid fa-wand-magic-sparkles" style="color:var(--warning);font-size:16px"></i></div>
    <div style="flex:1;">
      <div class="ai-panel-title">AMICI AI Assistant</div>
      <div class="ai-panel-sub">Pick a free model below · OpenRouter</div>
    </div>
    <button class="ai-close" id="aiCloseBtn" type="button" aria-label="Close AI assistant">×</button>
  </div>
  <div class="ai-key-bar" id="aiKeyBar">
    <input class="ai-key-input" id="aiKeyInput" type="password" placeholder="Paste OpenRouter API key (sk-or-…)" autocomplete="off">
    <button class="ai-key-btn" id="aiKeySaveBtn" type="button">Save</button>
  </div>
  <div class="ai-model-bar" id="aiModelBar">
    <select class="ai-model-select" id="aiModelSelect" onchange="selectAIModel(this.value)">
      <option value="">Loading free models...</option>
    </select>
    <button class="ai-key-btn" style="background:var(--text-sec);padding:4px 8px;font-size:11px;" onclick="fetchFreeModels()" title="Refresh model list"><i class="fa-solid fa-rotate"></i></button>
  </div>
  <div class="ai-messages" id="aiMessages"></div>
  <div class="ai-chips" id="aiChips"></div>
  <div class="ai-input-bar">
    <textarea class="ai-textarea" id="aiInput" placeholder="Ask anything about AMICI data…" rows="1"></textarea>
    <button class="ai-send" id="aiSend" type="button" title="Send" aria-label="Send AI message">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>
</div>

<nav class="tab-bar" id="tabBar"></nav>

<div class="cert-subnav-bar" id="certSubNav" style="display:none;"></div>

<div class="app-body">
  <aside class="mod-sidebar" id="modSidebar" role="navigation" aria-label="Module navigation"></aside>
  <main class="mod-content" id="modContent" role="main" tabindex="-1"></main>
</div>

<div class="toast-container" id="toastContainer" role="alert" aria-live="polite"></div>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal" id="modalBox"></div>
</div>

<div class="dropdown" id="dropdown"></div>

<!-- Certificate Detail Drawer -->
<div class="sap-drawer-overlay" id="certDrawerOverlay">
  <div class="sap-drawer">
    <div class="sap-drawer__header">
      <div class="sap-drawer__title">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>
        <span>Certificate Details</span>
      </div>
      <button class="sap-drawer__close" onclick="closeCertDrawer()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sap-drawer__body" id="certDrawerBody"></div>
    <div class="sap-drawer__footer">
      <button class="btn btn-ghost btn-sm" onclick="closeCertDrawer()">Close</button>
    </div>
  </div>
</div>

<!-- Certificate Reject Modal -->
<div class="reject-modal-overlay" id="certRejectModal">
  <div class="reject-modal">
    <div class="reject-modal__header">
      <h3><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Reject Certificate</h3>
      <button class="sap-drawer__close" onclick="closeCertRejectModal()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="reject-modal__body">
      <div id="certRejectInfo" style="background:var(--bg);border-radius:6px;padding:12px;margin-bottom:14px;font-size:13px;"></div>
      <div><label class="form-label">Rejection Reason <span style="color:var(--error)">*</span></label>
      <textarea id="certRejectReason" class="form-textarea" rows="3" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;font-size:13px;"></textarea></div>
    </div>
    <div class="reject-modal__footer">
      <button class="btn btn-ghost btn-sm" onclick="closeCertRejectModal()">Cancel</button>
      <button class="btn btn-danger btn-sm" onclick="confirmCertReject()">Confirm Rejection</button>
    </div>
  </div>
</div>

<!-- Certificate QR Modal -->
<div class="qr-modal-overlay" id="certQRModal">
  <div class="qr-modal-card">
    <button class="qr-modal-close" onclick="closeCertQRModal()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="qr-img-wrap" id="certQRImgWrap">
      <img id="certQRImg" alt="QR Code"/>
    </div>
    <div class="qr-title" id="certQRTitle">Certificate QR</div>
    <div class="qr-subtitle" id="certQRSubtitle"></div>
  </div>
</div>

</body>
</html>
